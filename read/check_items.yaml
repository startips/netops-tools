# ============================================================
# 检查项 & 设备类型配置
# ============================================================
# 修改方式：
#   - 增检查项：check_items 加名字 + 要检查的设备类型里加一行
#   - 增设备类型：device_types 加一组 + device_patterns 加匹配规则
# ============================================================

# 所有检查项名称（固定顺序）
check_items:
  - 版本
  - 补丁
  - 设备Esn
  - 多余文件检查
  - 硬件状态检查
  - 未关闭端口
  - bgp邻居状态
  - feature-software状态
  - 失败命令配置检查
  - mlag状态
  - hash配置
  - 告警检查
  - 线路检查

# 设备类型配置（列出需要检查的项，其余自动为 0）
device_types:
