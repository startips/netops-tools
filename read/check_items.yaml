# 线路检查配置
cable_check:
  # 按接口名正则排除（逻辑口/不需要检查的口）
  exclude_interfaces:
    - '^Eth-Trunk'
    - '^LoopBack'
    - '^MEth'
    - '^NULL'
    - '^Vlanif'
  # PHY状态为以下值的端口排除（LLDP不会有邻居）
  exclude_phy:
    - 'down'
    - '*down'
    - 'down(ed)'

# 设备名匹配规则（正则 → 设备类型，按优先级从高到低）
device_patterns:
  - ['-S_(A|B|C|D)', Spine]
  - ['-LF\d+_(A|B|C|D)', Leaf]
  - ['-SLF\d+_(A|B|C|D)', Slf]
  - ['-LA\d+_(A|B|C|D)', La]
  - ['-PL_(A|B|C|D)', Pl]
  - ['-PODLC_(A|B|C|D)', Podlc]
  - ['-GWLC_(A|B|C|D)', Gwlc]
  - ['-AGG_(A|B|C|D)', Agg]
  - ['-NFVL\d*_(A|B|C|D)', Nfvl]
  - ['-NFVW\d*_(A|B|C|D)', Nfvw]
  - ['-WC_(A|B|C|D)', Wc]
  - ['-FW\d*_(A|B|C|D)', Fw]
  - ['-SS_(A|B|C|D)', S0]
  - ['OBN.*?ACC', ObAcc]

