# ============================================================
# 配置比对规则文件 v2
# 配合 compare_configs.py v2 使用
# ============================================================
#
# === 原理 ===
# 1. 用 sections 里每条的正则从全文匹配段落（如 interface xxxx...#）
# 2. 匹配到的段落按 split_by 拆成子段，各自独立对比
# 3. 全文去掉所有匹配到的段落后，剩余行归入全局配置
# 4. 全局和每个子段分别做集合差集
#
# === 型号/版本过滤 ===
# ignore 下每条规则支持可选的 models 字段（子串匹配）
#   models 列表内每对 model+version 是 AND，列表项之间是 OR
#   不写 models 字段 → 该规则对所有设备生效
#   entry 中只写 model 不写 version → 只匹配型号
#   entry 中只写 version 不写 model → 只匹配版本
#
#   写法示例：
#     - pattern: '^typed rule'
#       models:
#         - model: 'CE6881'
#           version: 'V200R024'
#         - model: 'S5731'
#           version: 'V200R023'
# ============================================================

# ============================================================
# 零、全局设置
# ============================================================
settings:
  intended_dir: 'read/config_intended'   # 预期配置目录
  collected_dir: 'read/config'           # 采集配置目录
  output_dir: 'data'                     # 报告输出目录

# ============================================================
# 一、需要拆分对比的段落
# ============================================================
# name:     分类名（报告里显示）
# regex:    匹配完整段落的 Python 正则（用 [\s\S]*?\n# 跨行到独立 # 行）
# split_by: 段内拆分子段的正则
#
# 增加新类型：加一条即可
# ============================================================

sections:
  - name: '端口配置'
    regex: 'interface (?:MEth|Eth-Trunk|\S+GE|Vlanif|LoopBack|NULL|Tunnel|Nve|Vbdif|Serial|Mp-group|Pos|Cpos|Cellular|Virtual-Ethernet|XGigabitEthernet|GigabitEthernet)[\s\S]*?\n#'
    split_by: '^interface '

  - name: 'BGP配置'
    regex: 'bgp \d+[\s\S]*?#'
    split_by: '^bgp \d+'

  - name: 'ipv4-family单播'
    regex: 'ipv4-family unicast[\s\S]*?#'
    split_by: '^ipv4-family unicast'

  - name: 'ipv4-family实例'
    regex: 'ipv4-family vpn-instance[\s\S]*?#'
    split_by: '^ipv4-family vpn-instance'

  - name: 'ipv6-family单播'
    regex: 'ipv6-family unicast[\s\S]*?#'
    split_by: '^ipv6-family unicast'

  - name: 'ipv6-family实例'
    regex: 'ipv6-family vpn-instance[\s\S]*?#'
    split_by: '^ipv6-family vpn-instance'

  - name: 'VPN实例配置'
    regex: 'ip vpn-instance[\s\S]*?\n#'
    split_by: '^ip vpn-instance'

  - name: '用户界面配置'
    regex: 'user-interface [\s\S]*?\n#'
    split_by: '^user-interface '

  - name: 'wlan配置'
    regex: 'wlan[\s\S]*?\n#'
    split_by: '^wlan'

# ============================================================
# 二、忽略规则（统一：预期和采集两侧同时过滤）
# ============================================================
# global:   全局配置中忽略的行
# sections: 按段落头区分的忽略行
# ============================================================

ignore:

  global:
    - '^\s*#\s*$'                # 分隔行
    - '^\s*$'                    # 空白行
    - '^!.*'                      # 配置!注释的配置
    - '^return$'                 # 配置结束符
    - '^snmp-agent local-engineid' #自动生成snmp ID
    - '^\|\s*no\s*$'             # display | no 残留
    - '^device board'    #设备自动生成
    - '^device card'     #设备自动生成
    - '^capwap dtls' #无线配置
    - '^capwap unknown-unicast'#无线配置

  sections:
    # --- 端口配置 ---
    - header_pattern: '^interface '
      lines:
        - '^shutdown$'
        - '^device transceiver' #插光模块会出现的配置

    # --- BGP配置 ---
    - header_pattern: '^bgp '
      models:
        - model: 'CE6856'
          version: 'V200R019'
      lines:
        - 'undo private-4-byte-as enable'
    #用户界面
    - header_pattern: '^user-interface '
      models:
        - model: 'S5731'
          version: 'V200R024'
        - model: 'S5720'
          version: 'V200R019'
      lines:
        - '^protocol inbound ssh'