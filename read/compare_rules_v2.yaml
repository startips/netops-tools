# ============================================================
# 配置比对规则文件 v2
# 配合 compare_configs.py v2 使用
# ============================================================
#
# === 原理 ===
# 1. 用 sections 里每条的正则从全文匹配段落（如 interface xxxx...#）
# 2. 匹配到的段落按 split_by 拆成子段，各自独立对比
# 3. 全文去掉所有匹配到的段落后，剩余行归入全局配置
# 4. 全局和每个子段分别做集合差集
#
# === 型号/版本过滤 ===
# ignore 下每条规则支持可选的 model / version 字段（子串匹配，AND 关系）
#   写法示例：
#     - '^plain rule'
#     - pattern: '^typed rule'
#       model: 'CE6881'
# ============================================================

# ============================================================
# 一、需要拆分对比的段落
# ============================================================
# name:     分类名（报告里显示）
# regex:    匹配完整段落的 Python 正则（用 [\s\S]*?\n# 跨行到独立 # 行）
# split_by: 段内拆分子段的正则
#
# 增加新类型：加一条即可
# ============================================================

sections:
  - name: '端口配置'
    regex: 'interface (?!maximum-vty|con\b|vty\b)[\s\S]*?\n#'
    split_by: '^interface '

  - name: 'BGP配置'
    regex: 'bgp \d+[\s\S]*?\n#'
    split_by: '^bgp \d+'

  - name: 'VPN实例配置'
    regex: 'ip vpn-instance[\s\S]*?\n#'
    split_by: '^ip vpn-instance'

  - name: '用户界面配置'
    regex: 'user-interface [\s\S]*?\n#'
    split_by: '^user-interface '

# ============================================================
# 二、忽略规则（统一：预期和采集两侧同时过滤）
# ============================================================
# global:   全局配置中忽略的行
# sections: 按段落头区分的忽略行
# ============================================================

ignore:

  global:
    - '^\s*#\s*$'               # # 分隔行
    - '^\s*$'                    # 空白行
    - '^!.*'                      # 配置的开头
    - '^return$'                # 配置结束符
    - '^snmp-agent local-engineid' #自动生成snmp ID
    - '^\|\s*no\s*$'             # display | no 残留
    - '^device board'    #设备自动生成的 例如

  sections:
    # --- 端口配置 ---
    - header_pattern: '^interface '
      lines:
        - '^shutdown$'
        - '^device transceiver'

    # --- BGP配置 ---
    - header_pattern: '^bgp '
      lines:
        - 'undo private-4-byte-as enable'
